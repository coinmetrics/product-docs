stages:
  - build
  - test
  - update_docs

build-docs-test:
  image: docker:27.0.3
  stage: build
  services:
    - docker:27.0.3-dind
  before_script:
    - docker login -u gitlab-ci-token -p $CI_JOB_TOKEN $CI_REGISTRY
  script:
    # Pull previous image for cache (speeds up builds)
    - docker pull $CI_REGISTRY_IMAGE/docs-test:latest || true
    # Build with layer caching
    - docker build --cache-from $CI_REGISTRY_IMAGE/docs-test:latest -t $CI_REGISTRY_IMAGE/docs-test:$CI_COMMIT_SHA -t $CI_REGISTRY_IMAGE/docs-test:$CI_COMMIT_REF_SLUG -t $CI_REGISTRY_IMAGE/docs-test:latest .
    # Push all tags to registry
    - docker push $CI_REGISTRY_IMAGE/docs-test:$CI_COMMIT_SHA
    - docker push $CI_REGISTRY_IMAGE/docs-test:$CI_COMMIT_REF_SLUG
    - docker push $CI_REGISTRY_IMAGE/docs-test:latest
  tags:
    - svc-docker

test_documentation:
  stage: test
  image: $CI_REGISTRY_IMAGE/docs-test:$CI_COMMIT_SHA
  script:
    - make test
  artifacts:
    when: always
    reports:
      junit: test-reports/junit.xml
    paths:
      - test-reports/
    expire_in: 30 days
  allow_failure: true
  tags:
    - svc-docker

update_tutorials:
  stage: update_docs
  image: alpine:latest
  before_script:
    - apk add --no-cache git
    - git config user.name $AMS_DATA_USER
    - git config --global user.email "noreply@coinmetrics.io"
  script:
    - git clone https://$AMS_DATA_USER:$AMS_DATA_TOKEN@gitlab.com/coinmetrics/front-end/knowledge-base.git
    - git clone https://$AMS_DATA_USER:$AMS_DATA_TOKEN@gitlab.com/coinmetrics/research/cm_demo_assets.git
    - cp -r cm_demo_assets/markdowns/*.md knowledge-base/docs/tutorials/
    - find cm_demo_assets/notebooks -name "*.pdf" -exec cp -r --parents {} knowledge-base/docs/.gitbooks/assets/ \;
    - find cm_demo_assets/notebooks -name "*.ipynb" -exec cp -r --parents {} knowledge-base/docs/.gitbooks/assets/ \;
    - cd knowledge-base
    - BRANCH_NAME="update-demo-docs-$(date +%Y%m%d-%H%M%S)"
    - git checkout -b $BRANCH_NAME
    - git add docs/tutorials/*.md
    - |
      if git diff --staged --quiet; then
        echo "No changes detected. Skipping merge request creation."
      else
        echo "Changes detected. Creating merge request."
        git commit -m "Update tutorial docs from cm_demo_assets"
        git push -o merge_request.create -o merge_request.target=master -o merge_request.title="Update tutorial docs from cm_demo_assets" origin $BRANCH_NAME
      fi
  when: manual
  tags:
    - svc-docker

# Rebuilds the api-client-python GitBook space at spaces/api-client-python/docs
# from the latest master of the submodule, then opens an MR with any diff.
# Triggered manually from the master branch only.
#
# Credentials:
#   - $PYTHON_API_CLIENT_READ_TOKEN: read-only token for the upstream
#     api-client-python repo. Used by the submodule init/fetch to pull
#     the latest release without requiring SSH keys in the runner.
#   - $KNOWLEDGE_BASE_MR_BOT_TOKEN: project access token on
#     coinmetrics/front-end/knowledge-base with Developer role and
#     read_repository + write_repository scopes. Used to push the
#     auto-generated branch and open the MR. Shared with
#     update_python_api_client_changelog; deliberately scoped to this
#     one project so a leak cannot reach any other repository.
rebuild_python_api_client_docs:
  stage: update_docs
  # See verify_python_api_client_docs for why this is pinned by digest.
  image: python:3.11-slim@sha256:6d85378d88a19cd4d76079817532d62232be95757cb45945a99fec8e8084b9c2
  variables:
    # See verify_python_api_client_docs for why automatic submodule cloning
    # is disabled here.
    GIT_SUBMODULE_STRATEGY: none
  before_script:
    - apt-get update && apt-get install -y --no-install-recommends git
    # Project access tokens have no human identity, so tag commits with
    # a purpose-built name. Reviewers can then tell at a glance the MR
    # was generated by this watchdog instead of authored by a person.
    - git config --global user.name "api-client-python docs rebuild bot"
    - git config --global user.email "noreply@coinmetrics.io"
    - git -c "url.https://oauth2:${PYTHON_API_CLIENT_READ_TOKEN}@gitlab.com/.insteadOf=https://gitlab.com/" submodule update --init --recursive
    - pip install --no-cache-dir -r scripts/requirements-docs.txt
    # Editable install so autodoc can import the coinmetrics package while
    # rendering the reference pages. See the verify job for the rationale
    # behind --no-build-isolation.
    - pip install --no-cache-dir poetry-core
    - pip install --no-cache-dir --no-build-isolation -e submodules/api-client-python
  script:
    # Fast-forward the submodule to the tip of its default branch so the
    # rebuild always reflects the latest released client. Use the same
    # insteadOf rewrite as the submodule init so the fetch is authenticated.
    - git -c "url.https://oauth2:${PYTHON_API_CLIENT_READ_TOKEN}@gitlab.com/.insteadOf=https://gitlab.com/" -C submodules/api-client-python fetch --depth=1 origin HEAD
    - git -C submodules/api-client-python checkout FETCH_HEAD
    - python3 scripts/build_api_client_python_docs.py
    - BRANCH_NAME="rebuild-python-api-client-docs-$(date +%Y%m%d-%H%M%S)"
    - git checkout -b "$BRANCH_NAME"
    - git add submodules/api-client-python spaces/api-client-python/docs
    - |
      if git diff --staged --quiet; then
        echo "No changes detected. Skipping merge request creation."
      else
        echo "Changes detected. Creating merge request."
        git commit -m "Rebuild api-client-python docs from submodule"
        # The GitLab Runner writes a URL-scoped http.<repo>.extraheader
        # containing the gitlab-ci-token at clone time. That token has no
        # write_repository scope and silently overrides URL credentials,
        # so any subsequent push is rejected with "HTTP Basic: Access
        # denied". Drop every extraheader before pushing with our own
        # token below.
        { git config --local --get-regexp '^http\..*\.extraheader$' 2>/dev/null || true; } \
          | awk '{print $1}' \
          | while IFS= read -r key; do
              git config --local --unset-all "$key" || true
            done
        # The "oauth2" username is GitLab's convention for token-based
        # HTTPS auth and is required even though the token alone is what
        # actually authenticates the request.
        git remote set-url origin "https://oauth2:${KNOWLEDGE_BASE_MR_BOT_TOKEN}@gitlab.com/coinmetrics/front-end/knowledge-base.git"
        git push -o merge_request.create -o merge_request.target=master -o merge_request.title="Rebuild api-client-python docs" origin "$BRANCH_NAME"
      fi
  rules:
    # Scheduled pipeline (configured under CI/CD > Schedules in GitLab):
    # auto-runs on a cadence to act as the submodule-freshness watchdog.
    # If upstream has not moved, the build produces no diff and the job
    # exits silently without opening an MR.
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
    # Manual trigger from MR pipelines or MR source branch pipelines,
    # useful for validating changes to this automation before merging.
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" || $CI_OPEN_MERGE_REQUESTS'
      when: manual
    # Manual trigger from the master branch -- useful for forcing an
    # off-cycle rebuild after a known upstream release.
    - if: '$CI_COMMIT_BRANCH == "master"'
      when: manual
  tags:
    - svc-docker

# Watchdog for the hand-maintained Python API client changelog at
# spaces/api-client-python/docs/releases/changelog.md. The upstream
# api-client-python repo gates every change behind approval and stamps
# its version at deploy time, so we own the rendered changelog here and
# let this job nudge us whenever upstream ships a release we haven't
# documented yet. See scripts/update_api_client_python_changelog.py for
# the diagnosis logic.
#
# Credentials: same two tokens as rebuild_python_api_client_docs; see
# that job's header for the full description.
#   - $PYTHON_API_CLIENT_READ_TOKEN to read upstream releases.
#   - $KNOWLEDGE_BASE_MR_BOT_TOKEN to push the branch and open the MR.
update_python_api_client_changelog:
  stage: update_docs
  # Pinned by digest for the same reasons as rebuild_python_api_client_docs.
  image: python:3.11-slim@sha256:6d85378d88a19cd4d76079817532d62232be95757cb45945a99fec8e8084b9c2
  variables:
    GIT_SUBMODULE_STRATEGY: none
  before_script:
    - apt-get update && apt-get install -y --no-install-recommends git
    # See rebuild_python_api_client_docs for the rationale behind a
    # job-specific bot identity.
    - git config --global user.name "api-client-python changelog bot"
    - git config --global user.email "noreply@coinmetrics.io"
  script:
    - python3 scripts/update_api_client_python_changelog.py
    - BRANCH_NAME="update-python-api-client-changelog-$(date +%Y%m%d-%H%M%S)"
    - git checkout -b "$BRANCH_NAME"
    - git add spaces/api-client-python/docs/releases/changelog.md
    - |
      if git diff --staged --quiet; then
        echo "Changelog already in sync with upstream. No MR needed."
      else
        echo "Upstream has a release the changelog does not cover. Opening MR."
        git commit -m "Update api-client-python changelog with latest upstream release"
        # See rebuild_python_api_client_docs for why we strip every
        # http.*.extraheader before pushing with our own token.
        { git config --local --get-regexp '^http\..*\.extraheader$' 2>/dev/null || true; } \
          | awk '{print $1}' \
          | while IFS= read -r key; do
              git config --local --unset-all "$key" || true
            done
        git remote set-url origin "https://oauth2:${KNOWLEDGE_BASE_MR_BOT_TOKEN}@gitlab.com/coinmetrics/front-end/knowledge-base.git"
        git push \
          -o merge_request.create \
          -o merge_request.target=master \
          -o merge_request.title="Update api-client-python changelog" \
          -o merge_request.description="Auto-generated stub for the latest api-client-python release. cc @victoreram -- please refine the entry before merging." \
          -o merge_request.assign="victoreram" \
          origin "$BRANCH_NAME"
      fi
  rules:
    # Scheduled run (optional): keeps the changelog from drifting if
    # nobody triggers the job manually. Mirrors the rebuild job.
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
    # Manual trigger from MR pipelines or MR source branch pipelines,
    # useful for validating changes to this automation before merging.
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" || $CI_OPEN_MERGE_REQUESTS'
      when: manual
    # Manual trigger from master, the primary entry point.
    - if: '$CI_COMMIT_BRANCH == "master"'
      when: manual
  tags:
    - svc-docker
